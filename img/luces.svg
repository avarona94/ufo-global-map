<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Phoenix Lights: arco de 5 orbes amarillo-anaranjados -->
  <!-- Halo exterior de cada luz -->
  <circle cx="8"  cy="42" r="7" fill="#ffaa00" opacity="0.10"/>
  <circle cx="18" cy="35" r="7" fill="#ffaa00" opacity="0.10"/>
  <circle cx="32" cy="32" r="7" fill="#ffaa00" opacity="0.10"/>
  <circle cx="46" cy="35" r="7" fill="#ffaa00" opacity="0.10"/>
  <circle cx="56" cy="42" r="7" fill="#ffaa00" opacity="0.10"/>

  <!-- Halo medio -->
  <circle cx="8"  cy="42" r="4.5" fill="#ffbb22" opacity="0.22"/>
  <circle cx="18" cy="35" r="4.5" fill="#ffbb22" opacity="0.22"/>
  <circle cx="32" cy="32" r="4.5" fill="#ffbb22" opacity="0.22"/>
  <circle cx="46" cy="35" r="4.5" fill="#ffbb22" opacity="0.22"/>
  <circle cx="56" cy="42" r="4.5" fill="#ffbb22" opacity="0.22"/>

  <!-- Núcleo brillante -->
  <circle cx="8"  cy="42" r="2.8" fill="#ffcc44" opacity="1"/>
  <circle cx="18" cy="35" r="2.8" fill="#ffcc44" opacity="1"/>
  <circle cx="32" cy="32" r="2.8" fill="#ffdd66" opacity="1"/>
  <circle cx="46" cy="35" r="2.8" fill="#ffcc44" opacity="1"/>
  <circle cx="56" cy="42" r="2.8" fill="#ffcc44" opacity="1"/>

  <!-- Punto central más brillante -->
  <circle cx="8"  cy="42" r="1.2" fill="#ffffff" opacity="0.8"/>
  <circle cx="18" cy="35" r="1.2" fill="#ffffff" opacity="0.8"/>
  <circle cx="32" cy="32" r="1.2" fill="#ffffff" opacity="0.9"/>
  <circle cx="46" cy="35" r="1.2" fill="#ffffff" opacity="0.8"/>
  <circle cx="56" cy="42" r="1.2" fill="#ffffff" opacity="0.8"/>
</svg>
