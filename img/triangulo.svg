<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="triGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#334455" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#111820" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <!-- Halo exterior tenue -->
  <polygon points="32,5 61,56 3,56" fill="#ffffff" opacity="0.04"/>
  <!-- Cuerpo -->
  <polygon points="32,8 58,54 6,54" fill="url(#triGlow)" stroke="#445566" stroke-width="1.5"/>
  <!-- Líneas internas de paneles -->
  <line x1="32" y1="8"  x2="32" y2="54" stroke="#556677" stroke-width="0.6" opacity="0.5"/>
  <line x1="32" y1="30" x2="6"  y2="54" stroke="#556677" stroke-width="0.6" opacity="0.5"/>
  <line x1="32" y1="30" x2="58" y2="54" stroke="#556677" stroke-width="0.6" opacity="0.5"/>
  <!-- Luz central roja -->
  <circle cx="32" cy="38" r="4"   fill="#ff2200" opacity="0.25"/>
  <circle cx="32" cy="38" r="2.5" fill="#ff4400" opacity="0.7"/>
  <circle cx="32" cy="38" r="1.2" fill="#ff8866" opacity="1"/>
  <!-- Luces en vértices (blancas) -->
  <circle cx="32" cy="11" r="3"   fill="#ffffff" opacity="0.15"/>
  <circle cx="32" cy="11" r="1.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="32" cy="11" r="0.9" fill="#ffffff" opacity="1"/>
  <circle cx="8"  cy="53" r="3"   fill="#ffffff" opacity="0.15"/>
  <circle cx="8"  cy="53" r="1.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="8"  cy="53" r="0.9" fill="#ffffff" opacity="1"/>
  <circle cx="56" cy="53" r="3"   fill="#ffffff" opacity="0.15"/>
  <circle cx="56" cy="53" r="1.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="56" cy="53" r="0.9" fill="#ffffff" opacity="1"/>
</svg>
